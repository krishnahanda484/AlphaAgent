services:
  - type: web
    name: alphaagent
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      corepack enable
      pnpm install --no-frozen-lockfile
      pnpm --filter @workspace/investment-agent run build
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
