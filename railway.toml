[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/investment-agent run build && mkdir -p artifacts/api-server/public && cp -r artifacts/investment-agent/dist/* artifacts/api-server/public/ && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node artifacts/api-server/dist/index.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[healthcheck]
path = "/api/research/stats"
